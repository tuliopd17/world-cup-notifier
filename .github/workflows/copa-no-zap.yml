name: Copa no Zap

on:
  schedule:
    # GitHub Actions usa UTC. 08:00 UTC = 05:00 em Brasília (UTC-3).
    # O cron do Actions atrasa bastante em horarios cheios (ate ~2h),
    # entao agendamos as 5h para a mensagem chegar por volta das 7h.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar resumo da Copa no WhatsApp
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: python copa_zap.py
