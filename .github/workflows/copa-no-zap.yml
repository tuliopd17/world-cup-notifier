name: Copa no Zap

on:
  schedule:
    # GitHub Actions usa UTC. 09:50 UTC = 06:50 em Brasília (UTC-3).
    # O cron do Actions costuma atrasar alguns minutos, então agendamos
    # um pouco antes para a mensagem chegar perto das 7h.
    - cron: "50 9 * * *"
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar resumo da Copa no WhatsApp
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: python copa_zap.py
